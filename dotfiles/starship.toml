# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
symbol = '-'
style = 'fg:245'

# Replace the "â‌¯" symbol in the prompt with "â‍œ"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[î©± ïپ‹](bold fg:12)"
error_symbol = "[ï€چ ïپ‹](bold fg:9)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg: 252"
symbol = "َ°ک¬"
truncation_length = 12
truncation_symbol = ""
# format = " َ°œ¥ [î‚¶](bold fg:252)[$symbol $branch(:$remote_branch)](fg:235 bg:252)[î‚´ ](bold fg:252)"
format = " َ°œ¥ [î‚¶](bold fg:9)[$symbol $branch(:$remote_branch)](fg:235 bg:9)[î‚´ ](bold fg:9)"

[git_commit]
commit_hash_length = 4
tag_symbol = "ï’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[ًںچ’ PICKING](bold red)"

[git_status]
conflicted = " ًںڈ³ "
ahead = " ًںڈژًں’¨ "
behind = " ًںک° "
diverged = " ًںکµ "
untracked = " ًں¤· â€چ"
