[hostname]
ssh_only = false
format =  "[â€¢$hostname](bg:252 bold fg:235)[î‚´](bold fg:252)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
